name: Deploy Site (Jungle Gym + Demo)

on:
  push:
    branches: [main]
    paths:
      - 'jungle-gym/**'
      - 'packages/website/**'
      - 'packages/page-agent/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - 'packages/llms/**'
      - 'packages/page-controller/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build:website

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r jungle-gym/* _site/
          cp -r packages/website/dist _site/docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
